<!DOCTYPE html>
<html>
<head>

<title>Signup</title>

<style>

body{
margin:0;
font-family:Arial;
background:#dcfce7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#22c55e;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<form method="POST">

<input type="text" name="name" placeholder="Name" required>

<input type="text" name="email" placeholder="Email / Mobile" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Signup</button>

</form>

<p>{{msg}}</p>

<script>
let message = "{{msg}}"
if(message === "Signup Successful!"){
alert("Signup Successful!")
localStorage.removeItem("usedTrial")
}
</script>

<p>
Already have an account?
<a href="/login.html">Login</a>
</p>

</div>

</body>
</html>
